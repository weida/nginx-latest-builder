user nginx;
worker_processes auto;
error_log /usr/local/nginx/logs/error.log info;

events {
    worker_connections 1024;
}

http {
    include /usr/local/nginx/conf/mime.types;
    default_type application/octet-stream;

    log_format ech '$remote_addr - [$time_local] "$request" $status '
                   'ECH:$ssl_ech_status:$ssl_ech_outer_server_name $ssl_server_name';
    access_log /usr/local/nginx/logs/access.log ech;

    sendfile on;
    keepalive_timeout 65;

    ssl_protocols TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Shared-mode ECH: the public_name in this file must match a configured
    # virtual server. The first ssl_ech_file is also used for retry configs.
    ssl_ech_file /usr/local/nginx/ech/public.example.test.pem.ech;

    server {
        listen 80 default_server;
        server_name public.example.test hidden.example.test;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;
        listen 443 quic reuseport default_server;
        http2 on;
        http3 on;

        server_name public.example.test;

        ssl_certificate /usr/local/nginx/ssl/cert.pem;
        ssl_certificate_key /usr/local/nginx/ssl/key.pem;

        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header X-ECH-Status $ssl_ech_status always;
        add_header X-ECH-Outer-Server-Name $ssl_ech_outer_server_name always;

        location / {
            root /usr/local/nginx/html/public;
            index index.html;
        }
    }

    server {
        listen 443 ssl;
        listen 443 quic;
        http2 on;
        http3 on;

        server_name hidden.example.test;

        ssl_certificate /usr/local/nginx/ssl/cert.pem;
        ssl_certificate_key /usr/local/nginx/ssl/key.pem;

        add_header Alt-Svc 'h3=":443"; ma=86400' always;
        add_header X-ECH-Status $ssl_ech_status always;
        add_header X-ECH-Outer-Server-Name $ssl_ech_outer_server_name always;

        location / {
            root /usr/local/nginx/html/hidden;
            index index.html;
        }
    }
}
