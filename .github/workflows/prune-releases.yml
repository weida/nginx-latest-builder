name: Prune Old Releases

on:
  workflow_dispatch:
    inputs:
      keep_count:
        description: 'Number of recent releases to keep per track'
        required: false
        type: string
        default: '3'
  schedule:
    - cron: '30 3 * * *'

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
    - name: Prune old nginx releases
      uses: actions/github-script@v7
      env:
        KEEP_COUNT: ${{ inputs.keep_count || '3' }}
      with:
        script: |
          const keepCount = Number(process.env.KEEP_COUNT || '3');
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          const releases = await github.paginate(github.rest.repos.listReleases, {
            owner,
            repo,
            per_page: 100,
          });

          const nginxReleases = releases
            .filter((release) => /^v\d/.test(release.tag_name))
            .sort((a, b) => new Date(b.published_at || b.created_at) - new Date(a.published_at || a.created_at));

          const toDelete = nginxReleases.slice(keepCount);

          core.info(`Keeping ${Math.min(keepCount, nginxReleases.length)} nginx releases, deleting ${toDelete.length}`);

          for (const release of toDelete) {
            core.info(`Deleting nginx release ${release.tag_name}`);
            await github.rest.repos.deleteRelease({
              owner,
              repo,
              release_id: release.id,
            });
            await github.rest.git.deleteRef({
              owner,
              repo,
              ref: `tags/${release.tag_name}`,
            });
          }

    - name: Prune old freenginx releases
      uses: actions/github-script@v7
      env:
        KEEP_COUNT: ${{ inputs.keep_count || '3' }}
      with:
        script: |
          const keepCount = Number(process.env.KEEP_COUNT || '3');
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          const releases = await github.paginate(github.rest.repos.listReleases, {
            owner,
            repo,
            per_page: 100,
          });

          const freenginxReleases = releases
            .filter((release) => /^freenginx-v\d/.test(release.tag_name))
            .sort((a, b) => new Date(b.published_at || b.created_at) - new Date(a.published_at || a.created_at));

          const toDelete = freenginxReleases.slice(keepCount);

          core.info(`Keeping ${Math.min(keepCount, freenginxReleases.length)} freenginx releases, deleting ${toDelete.length}`);

          for (const release of toDelete) {
            core.info(`Deleting freenginx release ${release.tag_name}`);
            await github.rest.repos.deleteRelease({
              owner,
              repo,
              release_id: release.id,
            });
            await github.rest.git.deleteRef({
              owner,
              repo,
              ref: `tags/${release.tag_name}`,
            });
          }
